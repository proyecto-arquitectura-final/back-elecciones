server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful

spring:
  application:
    name: elecciones-backend

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/elecciones2026}
    username: ${SPRING_DATASOURCE_USERNAME:elecciones}
    password: ${SPRING_DATASOURCE_PASSWORD:elecciones}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${APP_JWT_SECRET:elecciones-colombia-2026-secret-key-super-segura-32chars}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:480}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
    admin-name: ${APP_SEED_ADMIN_NAME:Administrador}
    admin-email: ${APP_SEED_ADMIN_EMAIL:admin@elecciones.gov.co}
    admin-password: ${APP_SEED_ADMIN_PASSWORD:admin1234}
    analyst-name: ${APP_SEED_ANALYST_NAME:Analista Electoral}
    analyst-email: ${APP_SEED_ANALYST_EMAIL:analista@elecciones.gov.co}
    analyst-password: ${APP_SEED_ANALYST_PASSWORD:analista1234}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,metrics
